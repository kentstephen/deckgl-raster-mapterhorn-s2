<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S2 on Mapterhorn 3D terrain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Single fixed-viewport app: never let the page itself scroll, and keep
         the background dark so no white shows if a child reaches the edge. */
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #0a0d12;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      /* 100dvh tracks the real visible height (mobile URL bars etc.). */
      #root { width: 100vw; height: 100vh; height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
